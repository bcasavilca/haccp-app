<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>HACCP - Controle de Validade</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍔</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1e;
            color: #fff;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #2a2a4e;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #00d4ff;
        }
        
        .header p {
            font-size: 0.85rem;
            color: #888;
            margin-top: 5px;
        }
        
        .nav-tabs {
            display: flex;
            background: #1a1a2e;
            border-bottom: 1px solid #2a2a4e;
        }
        
        .nav-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            background: none;
            border: none;
            color: #888;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-tab.active {
            color: #00d4ff;
            border-bottom: 2px solid #00d4ff;
        }
        
        .content {
            padding: 15px;
        }
        
        .section {
            display: none;
        }
        
        .section.active {
            display: block;
        }
        
        /* Cards de Produtos */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 15px;
        }
        
        .product-card {
            background: linear-gradient(145deg, #1e1e3f 0%, #252550 100%);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #3a3a6e;
            position: relative;
            overflow: hidden;
        }
        
        .product-card:active {
            transform: scale(0.95);
        }
        
        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }
        
        .product-card.status-ok::before { background: #00ff88; }
        .product-card.status-warning::before { background: #ffcc00; }
        .product-card.status-danger::before { background: #ff4444; }
        
        .product-emoji {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }
        
        .product-name {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #fff;
        }
        
        .product-days {
            font-size: 0.75rem;
            color: #00d4ff;
        }
        
        .product-status {
            font-size: 0.7rem;
            margin-top: 6px;
            padding: 3px 8px;
            border-radius: 10px;
            display: inline-block;
        }
        
        .status-ok .product-status { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .status-warning .product-status { background: rgba(255, 204, 0, 0.2); color: #ffcc00; }
        .status-danger .product-status { background: rgba(255, 68, 68, 0.2); color: #ff4444; }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            justify-content: center;
            align-items: flex-end;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1a2e;
            width: 100%;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .modal-header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .modal-emoji {
            font-size: 3rem;
        }
        
        .modal-title {
            font-size: 1.3rem;
            margin-top: 10px;
        }
        
        .modal-subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #fff;
        }
        
        .btn-secondary {
            background: #2a2a4e;
            color: #fff;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        /* Histórico */
        .history-item {
            background: #1e1e3f;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .history-item.status-ok { border-left-color: #00ff88; }
        .history-item.status-warning { border-left-color: #ffcc00; }
        .history-item.status-danger { border-left-color: #ff4444; }
        .history-item.status-closed { border-left-color: #888; opacity: 0.7; }
        
        .history-info h3 {
            font-size: 1rem;
            margin-bottom: 4px;
        }
        
        .history-info p {
            font-size: 0.8rem;
            color: #888;
        }
        
        .history-status {
            text-align: right;
        }
        
        .history-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 10px;
            margin-bottom: 4px;
        }
        
        .history-date {
            font-size: 0.75rem;
            color: #666;
        }
        
        /* Filtros */
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        
        .filter-btn {
            padding: 8px 16px;
            background: #2a2a4e;
            border: none;
            border-radius: 20px;
            color: #888;
            font-size: 0.85rem;
            white-space: nowrap;
            cursor: pointer;
        }
        
        .filter-btn.active {
            background: #00d4ff;
            color: #1a1a2e;
        }
        
        /* Estatísticas */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: #1e1e3f;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #00d4ff;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: #888;
            margin-top: 4px;
        }
        
        /* Botão flutuante */
        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            border: none;
            border-radius: 50%;
            font-size: 1.8rem;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
            z-index: 50;
        }
        
        .fab:active {
            transform: scale(0.9);
        }
        
        /* Vazio */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-emoji {
            font-size: 4rem;
            margin-bottom: 16px;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #3a3a6e;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🍔 HACCP Control</h1>
        <p>Gestione la validità degli ingredienti</p>
    </div>
    
    <div class="nav-tabs">
        <button class="nav-tab active" onclick="showTab('products')">Prodotti</button>
        <button class="nav-tab" onclick="showTab('history')">Storico</button>
        <button class="nav-tab" onclick="showTab('stats')">Report</button>
    </div>
    
    <div class="content">
        <!-- Tab Prodotti -->
        <div id="products" class="section active">
            <div class="product-grid" id="productGrid"></div>
        </div>
        
        <!-- Tab Storico -->
        <div id="history" class="section">
            <div class="filters">
                <button class="filter-btn active" onclick="filterHistory('all')">Tutti</button>
                <button class="filter-btn" onclick="filterHistory('open')">Aperti</button>
                <button class="filter-btn" onclick="filterHistory('expired')">Scaduti</button>
                <button class="filter-btn" onclick="filterHistory('today')">Oggi</button>
            </div>
            <div id="historyList"></div>
        </div>
        
        <!-- Tab Report -->
        <div id="stats" class="section">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="statTotal">0</div>
                    <div class="stat-label">Aperti</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="statExpired">0</div>
                    <div class="stat-label">Scaduti</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="statToday">0</div>
                    <div class="stat-label">Oggi</div>
                </div>
            </div>
            <div id="expiringSoon"></div>
        </div>
    </div>
    
    <!-- Modal Azione -->
    <div class="modal" id="actionModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-emoji" id="modalEmoji">🍔</div>
                <h2 class="modal-title" id="modalTitle">Hamburger</h2>
                <p class="modal-subtitle" id="modalSubtitle">Validità: 1 giorno</p>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="openProduct()">📦 Nuovo Lotto</button>
                <button class="btn btn-secondary" onclick="closeModal()">❌ Annulla</button>
            </div>
        </div>
    </div>
    
    <!-- Modal Conferma -->
    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-emoji">✅</div>
                <h2 class="modal-title">Lotto Aperto!</h2>
                <p class="modal-subtitle" id="confirmSubtitle">Scadenza: 07/04/2026</p>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="closeConfirmModal()">OK</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
