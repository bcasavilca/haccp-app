<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>HACCP - Controle de Validade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1e; color: #fff; min-height: 100vh; padding-bottom: 80px; }
        .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 20px; text-align: center; border-bottom: 1px solid #2a2a4e; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 1.5rem; font-weight: 600; color: #00d4ff; }
        .header p { font-size: 0.85rem; color: #888; margin-top: 5px; }
        .nav-tabs { display: flex; background: #1a1a2e; border-bottom: 1px solid #2a2a4e; }
        .nav-tab { flex: 1; padding: 15px; text-align: center; background: none; border: none; color: #888; font-size: 0.9rem; cursor: pointer; transition: all 0.3s; }
        .nav-tab.active { color: #00d4ff; border-bottom: 2px solid #00d4ff; }
        .content { padding: 15px; }
        .section { display: none; }
        .section.active { display: block; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 15px; }
        .product-card { background: linear-gradient(145deg, #1e1e3f 0%, #252550 100%); border-radius: 16px; padding: 16px; text-align: center; cursor: pointer; transition: all 0.3s; border: 1px solid #3a3a6e; position: relative; overflow: hidden; }
        .product-card:active { transform: scale(0.95); }
        .product-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
        .product-card.status-ok::before { background: #00ff88; }
        .product-card.status-warning::before { background: #ffcc00; }
        .product-card.status-danger::before { background: #ff4444; }
        .product-emoji { font-size: 2.5rem; margin-bottom: 8px; }
        .product-name { font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; color: #fff; }
        .product-days { font-size: 0.75rem; color: #00d4ff; }
        .product-status { font-size: 0.7rem; margin-top: 6px; padding: 3px 8px; border-radius: 10px; display: inline-block; }
        .status-ok .product-status { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .status-warning .product-status { background: rgba(255, 204, 0, 0.2); color: #ffcc00; }
        .status-danger .product-status { background: rgba(255, 68, 68, 0.2); color: #ff4444; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.8); z-index: 200; justify-content: center; align-items: flex-end; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a2e; width: 100%; border-radius: 24px 24px 0 0; padding: 24px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { text-align: center; margin-bottom: 20px; }
        .modal-emoji { font-size: 3rem; }
        .modal-title { font-size: 1.3rem; margin-top: 10px; }
        .modal-subtitle { color: #888; font-size: 0.9rem; margin-top: 5px; }
        .btn-group { display: flex; gap: 12px; margin-top: 20px; }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%); color: #fff; }
        .btn-secondary { background: #2a2a4e; color: #fff; }
        .btn:active { transform: scale(0.95); }
        .history-item { background: #1e1e3f; border-radius: 12px; padding: 16px; margin-bottom: 12px; border-left: 4px solid; display: flex; justify-content: space-between; align-items: center; }
        .history-item.status-ok { border-left-color: #00ff88; }
        .history-item.status-warning { border-left-color: #ffcc00; }
        .history-item.status-danger { border-left-color: #ff4444; }
        .history-item.status-closed { border-left-color: #888; opacity: 0.7; }
        .history-info h3 { font-size: 1rem; margin-bottom: 4px; }
        .history-info p { font-size: 0.8rem; color: #888; }
        .history-status { text-align: right; }
        .history-badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 10px; margin-bottom: 4px; }
        .history-date { font-size: 0.75rem; color: #666; }
        .filters { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .filter-btn { padding: 8px 16px; background: #2a2a4e; border: none; border-radius: 20px; color: #888; font-size: 0.85rem; white-space: nowrap; cursor: pointer; }
        .filter-btn.active { background: #00d4ff; color: #1a1a2e; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #1e1e3f; border-radius: 12px; padding: 16px; text-align: center; }
        .stat-number { font-size: 1.8rem; font-weight: 700; color: #00d4ff; }
        .stat-label { font-size: 0.75rem; color: #888; margin-top: 4px; }
        .empty-state { text-align: center; padding: 60px 20px; color: #666; }
        .empty-emoji { font-size: 4rem; margin-bottom: 16px; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #3a3a6e; border-radius: 3px; }
        
        /* Estilos da Etiqueta */
        .label-container { background: #fff; color: #000; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .label-header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 15px; }
        .label-title { font-size: 1.4rem; font-weight: bold; text-transform: uppercase; }
        .label-row { display: flex; justify-content: space-between; margin: 12px 0; padding: 8px 0; border-bottom: 1px solid #ccc; }
        .label-row:last-child { border-bottom: none; }
        .label-label { font-size: 0.8rem; color: #666; text-transform: uppercase; }
        .label-value { font-size: 1.1rem; font-weight: bold; }
        .label-lot { font-family: monospace; font-size: 1.2rem; letter-spacing: 1px; }
        .label-footer { margin-top: 15px; padding-top: 10px; border-top: 2px solid #000; text-align: center; font-size: 0.7rem; color: #666; }
        @media print {
            body * { visibility: hidden; }
            #labelModal, #labelModal * { visibility: visible; }
            #labelModal { position: absolute; left: 0; top: 0; width: 100%; }
            .modal-content { background: #fff !important; color: #000 !important; }
            .btn-group { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
    </div>
    <div class="nav-tabs">
        <button class="nav-tab active" onclick="showTab('products')">Prodotti</button>
        <button class="nav-tab" onclick="showTab('history')">Storico</button>
        <button class="nav-tab" onclick="showTab('stats')">Report</button>
    </div>
    <div class="content">
        <div id="products" class="section active">
            <div class="product-grid" id="productGrid"></div>
        </div>
        <div id="history" class="section">
            <div class="filters">
                <button class="filter-btn active" onclick="filterHistory('all')">Tutti</button>
                <button class="filter-btn" onclick="filterHistory('open')">Aperti</button>
                <button class="filter-btn" onclick="filterHistory('expired')">Scaduti</button>
                <button class="filter-btn" onclick="filterHistory('today')">Oggi</button>
            </div>
            <div id="historyList"></div>
        </div>
        <div id="stats" class="section">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="statTotal">0</div>
                    <div class="stat-label">Aperti</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="statExpired">0</div>
                    <div class="stat-label">Scaduti</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="statToday">0</div>
                    <div class="stat-label">Oggi</div>
                </div>
            </div>
            <div id="expiringSoon"></div>
        </div>
    </div>
    <div class="modal" id="actionModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-emoji" id="modalEmoji">🍔</div>
                <h2 class="modal-title" id="modalTitle">Hamburger</h2>
                <p class="modal-subtitle" id="modalSubtitle">Validità: 1 giorno</p>
            </div>
            <div class="form-group" style="padding: 0 20px; margin-bottom: 15px;">
                <label style="display: block; color: #888; font-size: 0.85rem; margin-bottom: 5px;">Fornitore</label>
                <input type="text" id="fornitoreInput" value="Niki Romito" style="width: 100%; padding: 10px; background: #252550; border: 1px solid #3a3a6e; border-radius: 8px; color: #fff; font-size: 1rem;" placeholder="Nome fornitore...">
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="openProduct()">📦 Nuovo Lotto</button>
                <button class="btn btn-secondary" id="sameLotBtn" onclick="sameLot()" style="display: none;">📋 Stesso Lotto</button>
                <button class="btn btn-secondary" onclick="closeModal()">❌ Annulla</button>
            </div>
        </div>
    </div>
    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-emoji">✅</div>
                <h2 class="modal-title">Lotto Aperto!</h2>
                <p class="modal-subtitle" id="confirmSubtitle">Scadenza: 07/04/2026</p>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="closeConfirmModal()">OK</button>
            </div>
        </div>
    </div>
    <div class="modal" id="labelModal">
        <div class="modal-content">
            <div class="label-container" id="labelContent">
                <!-- Etiqueta será gerada aqui -->
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="printLabel()">🖨️ Stampa</button>
                <button class="btn btn-secondary" onclick="closeLabelModal()">Chiudi</button>
            </div>
        </div>
    </div>
    <script>
        const PRODUCTS = [
            { name: "Bombe", days: 1, emoji: "🥖" },
            { name: "Hamburguer", days: 1, emoji: "🍔" },
            { name: "Nuvola", days: 1, emoji: "🥯" },
            { name: "Pane", days: 1, emoji: "🍞" },
            { name: "Salsiccia", days: 1, emoji: "🌭" },
            { name: "Ventricina", days: 1, emoji: "🥓" },
            { name: "Cipolla", days: 2, emoji: "🧅" },
            { name: "Focacce", days: 2, emoji: "🍕" },
            { name: "Iceberg", days: 2, emoji: "🥬" },
            { name: "Misticanza", days: 2, emoji: "🥗" },
            { name: "Pomodoro Dry", days: 2, emoji: "🍅" },
            { name: "Scarola", days: 2, emoji: "🥬" },
            { name: "Basilico", days: 2, emoji: "🌿" },
            { name: "Cetriolo", days: 3, emoji: "🥒" },
            { name: "Chips", days: 3, emoji: "🍟" },
            { name: "Pollo Fondente", days: 3, emoji: "🍗" },
            { name: "Porcini", days: 3, emoji: "🍄" },
            { name: "Tonno", days: 3, emoji: "🐟" },
            { name: "Pomodoro Ramato", days: 3, emoji: "🍅" },
            { name: "Pomodoro Base", days: 8, emoji: "🥫" },
            { name: "Maiale Fondente", days: 2, emoji: "🐷" },
            { name: "Creme Pomodoro", days: 4, emoji: "🥫" },
            { name: "Mozzarela", days: 4, emoji: "🧀" },
            { name: "Panceta", days: 4, emoji: "🥓" },
            { name: "Crema/Pistacchio", days: 4, emoji: "🍨" },
            { name: "Minestra", days: 5, emoji: "🍲" },
            { name: "Prosciutto Cotto", days: 5, emoji: "🍖" },
            { name: "Prosciutto Crudo", days: 5, emoji: "🥩" },
            { name: "Zuppa", days: 5, emoji: "🥣" },
            { name: "Bat. Pomodoro", days: 6, emoji: "🍅" },
            { name: "Carciofe", days: 6, emoji: "🌿" },
            { name: "Mayonese", days: 6, emoji: "🥄" },
            { name: "Senapata", days: 6, emoji: "🌭" },
            { name: "Verza", days: 6, emoji: "🥬" },
            { name: "Ceci", days: 8, emoji: "🫘" },
            { name: "Fagiole", days: 8, emoji: "🫘" },
            { name: "Riso Nero", days: 8, emoji: "🍚" },
            { name: "BBQ", days: 10, emoji: "🍖" },
            { name: "Toast", days: 15, emoji: "🍞" }
        ];

        let records = JSON.parse(localStorage.getItem('haccp_records')) || [];
        let currentProduct = null;
        let currentFilter = 'all';

        function init() {
            renderProducts();
            renderHistory();
            updateStats();
        }

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            const now = new Date();
            
            grid.innerHTML = PRODUCTS.map(product => {
                const openRecord = records.find(r => 
                    r.product === product.name && 
                    r.status === 'open' &&
                    new Date(r.expiryDate) > now
                );
                
                let status = 'status-ok';
                let statusText = 'Disponibile';
                
                if (openRecord) {
                    const daysLeft = Math.ceil((new Date(openRecord.expiryDate) - now) / (1000 * 60 * 60 * 24));
                    
                    if (daysLeft < 0) {
                        status = 'status-danger';
                        statusText = 'Scaduto';
                    } else if (daysLeft <= 1) {
                        status = 'status-warning';
                        statusText = 'Scade oggi';
                    } else {
                        status = 'status-ok';
                        statusText = daysLeft + ' gg rimasti';
                    }
                }
                
                return '<div class="product-card ' + status + '" onclick="showProductModal(\'' + product.name + '\')">' +
                    '<div class="product-emoji">' + product.emoji + '</div>' +
                    '<div class="product-name">' + product.name + '</div>' +
                    '<div class="product-days">' + product.days + ' GG</div>' +
                    '<div class="product-status">' + statusText + '</div>' +
                    '</div>';
            }).join('');
        }

        function showProductModal(productName) {
            currentProduct = PRODUCTS.find(p => p.name === productName);
            if (!currentProduct) return;
            
            // Verifica se tem lote aberto para este produto
            const now = new Date();
            const openRecord = records.find(r => 
                r.product === currentProduct.name && 
                r.status === 'open' &&
                new Date(r.expiryDate) > now
            );
            
            // Mostra/esconde botão "Stesso Lotto"
            const sameLotBtn = document.getElementById('sameLotBtn');
            if (openRecord) {
                sameLotBtn.style.display = 'block';
                // Guarda referência ao lote atual
                currentProduct.existingLot = openRecord;
            } else {
                sameLotBtn.style.display = 'none';
                currentProduct.existingLot = null;
            }
            
            document.getElementById('modalEmoji').textContent = currentProduct.emoji;
            document.getElementById('modalTitle').textContent = currentProduct.name;
            document.getElementById('modalSubtitle').textContent = 'Validità: ' + currentProduct.days + ' giorni';
            
            document.getElementById('actionModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('actionModal').classList.remove('active');
            currentProduct = null;
        }

        function openProduct() {
            if (!currentProduct) return;
            
            const now = new Date();
            // CORREÇÃO: Criar data de expiração correta
            // Adiciona X dias à data/hora ATUAL (não meia-noite)
            const expiryDate = new Date(now.getTime() + (currentProduct.days * 24 * 60 * 60 * 1000));
            
            const lotNumber = generateLot();
            
            // Pega o fornitore do input
            const fornitore = document.getElementById('fornitoreInput')?.value || 'Niki Romito';
            
            const record = {
                id: Date.now(),
                product: currentProduct.name,
                emoji: currentProduct.emoji,
                openDate: now.toISOString(),
                expiryDate: expiryDate.toISOString(),
                daysValid: currentProduct.days,
                status: 'open',
                lot: lotNumber,
                responsible: 'Bruno',
                fornitore: fornitore
            };
            
            records.forEach(r => {
                if (r.product === currentProduct.name && r.status === 'open') {
                    r.status = 'closed';
                }
            });
            
            records.push(record);
            saveRecords();
            
            closeModal();
            
            // Mostra a etiqueta
            showLabel(record);
            
            renderProducts();
            renderHistory();
            updateStats();
        }

        function sameLot() {
            if (!currentProduct || !currentProduct.existingLot) return;
            
            // Mostra a etiqueta do lote existente (sem emoji)
            showLabelSimple(currentProduct.existingLot);
            
            closeModal();
        }

        function showLabelSimple(record) {
            const openDate = new Date(record.openDate);
            const expDate = new Date(record.expiryDate);
            
            const openDateStr = openDate.toLocaleDateString('it-IT');
            const openTimeStr = openDate.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
            const expDateStr = expDate.toLocaleDateString('it-IT');
            const expTimeStr = expDate.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
            
            document.getElementById('labelContent').innerHTML = 
                '<div class="label-header">' +
                '<div class="label-title">' + record.product + '</div>' +
                '</div>' +
                '<div class="label-row">' +
                '<div><div class="label-label">Lotto Nº</div><div class="label-value label-lot">' + record.lot + '</div></div>' +
                '</div>' +
                '<div class="label-row">' +
                '<div><div class="label-label">Fornitore</div><div class="label-value">' + (record.fornitore || 'Niki Romito') + '</div></div>' +
                '</div>' +
                '<div class="label-row">' +
                '<div><div class="label-label">Apertura</div><div class="label-value">' + openDateStr + ' ' + openTimeStr + '</div></div>' +
                '</div>' +
                '<div class="label-row">' +
                '<div><div class="label-label">Scadenza (24h)</div><div class="label-value" style="color: #ff4444;">' + expDateStr + ' ' + expTimeStr + '</div></div>' +
                '</div>' +
                '<div class="label-row">' +
                '<div><div class="label-label">Responsabile</div><div class="label-value">' + record.responsible + '</div></div>' +
                '<div style="text-align: right;"><div class="label-label">Validità</div><div class="label-value">' + record.daysValid + ' GG</div></div>' +
                '</div>' +
                '<div class="label-footer">HACCP Control • Stesso Lotto (già aperto)</div>';
            
            document.getElementById('labelModal').classList.add('active');
        }

        function generateLot() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let lot = '';
            for (let i = 0; i < 6; i++) {
                lot += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return 'LT-' + lot;
        }

        function showLabel(record) {
            const openDate = new Date(record.openDate);
            const expDate = new Date(record.expiryDate);
            
            // Formata data e hora
            const openDateStr = openDate.toLocaleDateString('it-IT');
            const openTimeStr = openDate.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
            const expDateStr = expDate.toLocaleDateString('it-IT');
            const expTimeStr = expDate.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
            
            document.getElementById('labelContent').innerHTML = 
                '<div class="label-header">' +
                '<div class="label-title">' + record.product + '</div>' +
                '</div>' +
                '<div class="label-row">' +
                '<div><div class="label-label">Lotto Nº</div><div class="label-value label-lot">' + record.lot + '</div></div>' +
                '</div>' +
                '<div class="label-row">' +
                '<div><div class="label-label">Fornitore</div><div class="label-value">' + (record.fornitore || 'Niki Romito') + '</div></div>' +
                '</div>' +
                '<div class="label-row">' +
                '<div><div class="label-label">Apertura</div><div class="label-value">' + openDateStr + ' ' + openTimeStr + '</div></div>' +
                '</div>' +
                '<div class="label-row">' +
                '<div><div class="label-label">Scadenza (24h)</div><div class="label-value" style="color: #ff4444;">' + expDateStr + ' ' + expTimeStr + '</div></div>' +
                '</div>' +
                '<div class="label-row">' +
                '<div><div class="label-label">Responsabile</div><div class="label-value">' + record.responsible + '</div></div>' +
                '<div style="text-align: right;"><div class="label-label">Validità</div><div class="label-value">' + record.daysValid + ' GG</div></div>' +
                '</div>' +
                '<div class="label-footer">HACCP Control • Scadenza: ' + record.daysValid + ' giorni dopo apertura</div>';
            
            document.getElementById('labelModal').classList.add('active');
        }

        function closeLabelModal() {
            document.getElementById('labelModal').classList.remove('active');
        }

        function printLabel() {
            window.print();
        }

        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('active');
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const now = new Date();
            
            let filtered = [...records].sort((a, b) => b.id - a.id);
            
            if (currentFilter === 'open') {
                filtered = filtered.filter(r => r.status === 'open' && new Date(r.expiryDate) > now);
            } else if (currentFilter === 'expired') {
                filtered = filtered.filter(r => new Date(r.expiryDate) <= now);
            } else if (currentFilter === 'today') {
                const tomorrow = new Date(now);
                tomorrow.setDate(tomorrow.getDate() + 1);
                filtered = filtered.filter(r => {
                    const exp = new Date(r.expiryDate);
                    return exp <= tomorrow && exp > now;
                });
            }
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-emoji">📋</div><p>Nessun record trovato</p></div>';
                return;
            }
            
            list.innerHTML = filtered.map(record => {
                const daysLeft = Math.ceil((new Date(record.expiryDate) - now) / (1000 * 60 * 60 * 24));
                let status = 'status-ok';
                let statusText = daysLeft + ' gg';
                let statusClass = 'open';
                
                if (record.status === 'closed') {
                    status = 'status-closed';
                    statusText = 'Chiuso';
                    statusClass = 'closed';
                } else if (daysLeft < 0) {
                    status = 'status-danger';
                    statusText = 'Scaduto';
                } else if (daysLeft <= 1) {
                    status = 'status-warning';
                    statusText = 'Scade oggi';
                }
                
                const openDate = new Date(record.openDate).toLocaleDateString('it-IT');
                const expDate = new Date(record.expiryDate).toLocaleDateString('it-IT');
                
                return '<div class="history-item ' + status + ' ' + statusClass + '">' +
                    '<div class="history-info"><h3>' + record.emoji + ' ' + record.product + '</h3>' +
                    '<p>Lotto: ' + record.lot + '</p>' +
                    '<p>Aperto: ' + openDate + ' | Scade: ' + expDate + '</p></div>' +
                    '<div class="history-status"><div class="history-badge">' + statusText + '</div>' +
                    '<div class="history-date">' + record.daysValid + 'GG</div></div></div>';
            }).join('');
        }

        function filterHistory(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderHistory();
        }

        function updateStats() {
            const now = new Date();
            
            const totalOpen = records.filter(r => 
                r.status === 'open' && new Date(r.expiryDate) > now
            ).length;
            
            const expired = records.filter(r => 
                new Date(r.expiryDate) <= now
            ).length;
            
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const expiringToday = records.filter(r => {
                const exp = new Date(r.expiryDate);
                return r.status === 'open' && exp <= tomorrow && exp > now;
            }).length;
            
            document.getElementById('statTotal').textContent = totalOpen;
            document.getElementById('statExpired').textContent = expired;
            document.getElementById('statToday').textContent = expiringToday;
            
            const expiringSoon = records
                .filter(r => r.status === 'open' && new Date(r.expiryDate) > now)
                .sort((a, b) => new Date(a.expiryDate) - new Date(b.expiryDate))
                .slice(0, 5);
            
            const soonDiv = document.getElementById('expiringSoon');
            if (expiringSoon.length > 0) {
                soonDiv.innerHTML = '<h3 style="margin: 20px 0 10px; font-size: 1rem; color: #ffcc00;">⚠️ Scadono presto:</h3>' +
                    expiringSoon.map(r => {
                        const daysLeft = Math.ceil((new Date(r.expiryDate) - now) / (1000 * 60 * 60 * 24));
                        return '<div style="background: #1e1e3f; padding: 12px; border-radius: 8px; margin-bottom: 8px;">' +
                            r.emoji + ' ' + r.product + ' - ' + daysLeft + ' gg rimasti</div>';
                    }).join('');
            } else {
                soonDiv.innerHTML = '';
            }
        }

        function showTab(tabName) {
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            document.querySelectorAll('.section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(tabName).classList.add('active');
            
            if (tabName === 'products') renderProducts();
            if (tabName === 'history') renderHistory();
            if (tabName === 'stats') updateStats();
        }

        function saveRecords() {
            localStorage.setItem('haccp_records', JSON.stringify(records));
        }

        init();

        setInterval(() => {
            renderProducts();
            updateStats();
        }, 60000);
    </script>
</body>
</html>
